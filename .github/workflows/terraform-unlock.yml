name: Terraform Unlock

on:
  workflow_dispatch:
    inputs:
      lock_id:
        required: true
        type: string

jobs:
  main:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_ID }}
          token_format: access_token

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.6

      - run: terraform -chdir=terraform init

      - env:
          TF_VAR_op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_gh_token: ${{ github.token }}
          TF_INPUT: false
          LOCK_ID: ${{ github.event.inputs.lock_id }}
        run: terraform -chdir=terraform force-unlock -force "$LOCK_ID" -no-color
